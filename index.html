<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">T</div>
        <span>TaskFlow</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button class="nav-btn" data-view="tasks">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          All Tasks
        </button>
        <button class="nav-btn" data-view="board">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          Board
        </button>
        <button class="nav-btn" data-view="calendar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </button>
      </nav>
      <div class="sidebar-categories">
        <h3>Categories</h3>
        <div class="category-list" id="categoryList"></div>
        <button class="add-category-btn" id="addCategoryBtn">+ Add Category</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1 id="viewTitle">Dashboard</h1>
          <p class="header-date" id="headerDate"></p>
        </div>
        <div class="header-right">
          <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search tasks..." id="searchInput">
          </div>
          <button class="btn-primary" id="addTaskBtn">+ New Task</button>
        </div>
      </header>

      <!-- Dashboard View -->
      <div class="view active" id="dashboardView">
        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon total">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-number" id="totalTasks">0</span>
              <span class="stat-label">Total Tasks</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon progress">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-number" id="inProgressTasks">0</span>
              <span class="stat-label">In Progress</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon completed">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-number" id="completedTasks">0</span>
              <span class="stat-label">Completed</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon overdue">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="stat-info">
              <span class="stat-number" id="overdueTasks">0</span>
              <span class="stat-label">Overdue</span>
            </div>
          </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
          <!-- Mini Calendar -->
          <div class="card mini-calendar-card">
            <div class="mini-cal-header">
              <h2 id="miniCalMonth"></h2>
              <div class="mini-cal-nav">
                <button class="mini-cal-btn" id="miniCalPrev">&lt;</button>
                <button class="mini-cal-btn" id="miniCalNext">&gt;</button>
              </div>
            </div>
            <div class="mini-cal-grid">
              <span class="mini-cal-day-name">S</span>
              <span class="mini-cal-day-name">M</span>
              <span class="mini-cal-day-name">T</span>
              <span class="mini-cal-day-name">W</span>
              <span class="mini-cal-day-name">T</span>
              <span class="mini-cal-day-name">F</span>
              <span class="mini-cal-day-name">S</span>
              <div class="mini-cal-days" id="miniCalDays"></div>
            </div>
          </div>

          <!-- My Tasks Board -->
          <div class="card my-tasks-board-card">
            <h2>My Tasks</h2>
            <div class="my-tasks-tabs" id="myTasksTabs"></div>
            <div class="my-tasks-board" id="myTasksBoard"></div>
          </div>

          <!-- Priority Breakdown -->
          <div class="card priority-card">
            <h2>By Priority</h2>
            <div class="priority-bars" id="priorityBars"></div>
          </div>

          <!-- Upcoming Deadlines -->
          <div class="card deadlines-card">
            <h2>Upcoming Deadlines</h2>
            <div class="deadlines-list" id="deadlinesList"></div>
          </div>

          <!-- Daily Schedule -->
          <div class="card schedule-card">
            <div class="schedule-header">
              <h2>Today's Schedule</h2>
              <span class="schedule-date-label" id="scheduleDate"></span>
            </div>
            <div class="schedule-unscheduled" id="scheduleUnscheduled"></div>
            <div class="schedule-timeline" id="scheduleTimeline"></div>
          </div>
        </div>
      </div>

      <!-- Tasks View -->
      <div class="view" id="tasksView">
        <div class="tasks-toolbar">
          <div class="filter-group">
            <select id="filterStatus">
              <option value="all">All Status</option>
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
            <select id="filterPriority">
              <option value="all">All Priority</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select id="filterCategory">
              <option value="all">All Categories</option>
            </select>
          </div>
          <div class="sort-group">
            <select id="sortBy">
              <option value="created">Date Created</option>
              <option value="dueDate">Due Date</option>
              <option value="priority">Priority</option>
              <option value="name">Name</option>
            </select>
          </div>
        </div>
        <div class="tasks-list" id="tasksList"></div>
      </div>

      <!-- Board View -->
      <div class="view" id="boardView">
        <div class="board-filters" id="boardFilters"></div>
        <div class="board">
          <div class="board-column" data-status="todo">
            <div class="column-header">
              <span class="column-dot todo"></span>
              <h3>To Do</h3>
              <span class="column-count" id="boardTodoCount">0</span>
            </div>
            <div class="column-tasks" id="boardTodo"></div>
          </div>
          <div class="board-column" data-status="in-progress">
            <div class="column-header">
              <span class="column-dot in-progress"></span>
              <h3>In Progress</h3>
              <span class="column-count" id="boardProgressCount">0</span>
            </div>
            <div class="column-tasks" id="boardProgress"></div>
          </div>
          <div class="board-column" data-status="done">
            <div class="column-header">
              <span class="column-dot done"></span>
              <h3>Done</h3>
              <span class="column-count" id="boardDoneCount">0</span>
            </div>
            <div class="column-tasks" id="boardDone"></div>
          </div>
        </div>
      </div>

      <!-- Calendar View -->
      <div class="view" id="calendarView">
        <div class="calendar-header">
          <button class="cal-nav" id="calPrev">&lt;</button>
          <h2 id="calMonth"></h2>
          <button class="cal-nav" id="calNext">&gt;</button>
        </div>
        <div class="calendar-grid">
          <div class="cal-day-name">Sun</div>
          <div class="cal-day-name">Mon</div>
          <div class="cal-day-name">Tue</div>
          <div class="cal-day-name">Wed</div>
          <div class="cal-day-name">Thu</div>
          <div class="cal-day-name">Fri</div>
          <div class="cal-day-name">Sat</div>
          <div id="calendarDays"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">New Task</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label>Task Name</label>
          <input type="text" id="taskName" required placeholder="Enter task name...">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc" rows="3" placeholder="Add a description..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="taskStatus">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="taskCategory"></select>
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Scheduled Time</label>
            <select id="taskScheduledHour">
              <option value="">Not scheduled</option>
            </select>
          </div>
          <div class="form-group">
            <label>Duration</label>
            <select id="taskDuration">
              <option value="1">1 hour</option>
              <option value="0.5">30 min</option>
              <option value="1.5">1.5 hours</option>
              <option value="2">2 hours</option>
              <option value="3">3 hours</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Subtasks</label>
          <div id="subtasksList"></div>
          <div class="subtask-add">
            <input type="text" id="subtaskInput" placeholder="Add subtask...">
            <button type="button" id="addSubtaskBtn">+</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="button" class="btn-danger" id="deleteBtn" style="display:none">Delete</button>
          <button type="submit" class="btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
